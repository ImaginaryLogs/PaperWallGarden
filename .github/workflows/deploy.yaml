name: Deploy Quartz Site with WASM Playground

on:
  push:
    branches:
      - main 

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # 1. Install root dependencies (This now securely links your local plugin folder via the file: protocol)
      - name: Install Project Dependencies
        run: npm ci

      # 2. Compile the Rust logic
      - name: Step 1 - Compile Rust WebAssembly Target
        run: |
          cd wasm-modules/quantum-sim
          wasm-pack build --target web

      # 3. Build the plugin exactly like you did locally
      - name: Step 2 - Build the Local Quartz Plugin Bundle
        run: |
          cd quartz-plugin-wasm-playground
          npm run build

      # DIAGNOSTIC PROBE: Check file existence after compilation
      - name: Diagnostic 1 - Confirm build output exists
        run: |
          echo "Checking if WASM build artifacts exist..."
          ls -l wasm-modules/quantum-sim/pkg/quantum_sim_bg.wasm || echo "ERROR: WASM binary missing!"
          ls -l wasm-modules/quantum-sim/pkg/quantum_sim.js || echo "ERROR: WASM JS missing!"

      - name: Step 2.5 - Sync WASM files
        run: |
          mkdir -p static/wasm
          cp wasm-modules/quantum-sim/pkg/quantum_sim_bg.wasm static/wasm/
          cp wasm-modules/quantum-sim/pkg/quantum_sim.js static/wasm/

      # DIAGNOSTIC PROBE: Check if static/wasm was actually populated
      - name: Diagnostic 2 - Confirm static folder populated
        run: |
          echo "Listing contents of static/wasm/:"
          ls -l static/wasm/

      - name: Step 3 - Execute Quartz Static Site Generation Build
        run: |
          # Ensure the directory exists so the bundler doesn't crash on import
          mkdir -p .quartz/plugins
          
          # If the index file is missing, create a placeholder so the build can proceed
          if [ ! -f .quartz/plugins/index.ts ]; then
            echo 'export const CustomOgImagesEmitterName = "CustomOgImagesEmitter"; export const plugins = {};' > .quartz/plugins/index.ts
          fi
          
          # Run the build
          npm run quartz build

      - name: Diagnostic - List public directory
        run: |
          echo "Listing contents of public/wasm:"
          ls -R public/wasm || echo "Folder public/wasm does not exist!"

      - name: Upload Static Web Production Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4