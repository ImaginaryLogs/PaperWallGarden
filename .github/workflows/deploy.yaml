# .github/workflows/deploy.yml
name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-wasm:
    name: Compile Wasm Modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm-pack
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wasm-modules/*/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build quantum-sim Wasm
        run: |
          cd wasm-modules/quantum-sim
          wasm-pack build --target web --out-dir ../compiled/quantum-sim

      - name: Build black-scholes Wasm
        run: |
          cd wasm-modules/black-scholes
          wasm-pack build --target web --out-dir ../compiled/black-scholes

      - name: Upload Wasm artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-compiled
          path: wasm-modules/compiled/

  build-site:
    name: Build Astro Site
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history for git-based last-modified dates
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Download Wasm artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-compiled
          path: wasm-modules/compiled/

      - name: Copy Wasm to public dir
        run: |
          mkdir -p public/wasm
          cp -r wasm-modules/compiled/* public/wasm/

      - name: Install dependencies
        run: npm ci

      - name: Create vault symlink (if not committed)
        run: |
          if [ ! -L src/content/garden ]; then
            ln -sf ../../../obsidian-vault src/content/garden
          fi

      - name: Build Astro
        run: npm run build
        env:
          # Makes base URL available for correct asset resolution
          PUBLIC_SITE_BASE: '/YOUR-REPO-NAME'

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-site
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4